services:
  postgres:
    image: postgres:16-alpine
    container_name: ac-system-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env
    environment:
      POSTGRES_DB: acsystem
      POSTGRES_USER: acadmin
      POSTGRES_PASSWORD: ${DB_PASSWORD:?请设置 DB_PASSWORD 环境变量}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acadmin -d acsystem"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ac-system-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://acadmin:${DB_PASSWORD:?请设置 DB_PASSWORD 环境变量}@postgres:5432/acsystem?schema=public"
      JWT_SECRET: ${JWT_SECRET:?请设置 JWT_SECRET 环境变量}
      NODE_ENV: production
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-合同发票管理系统}

volumes:
  postgres_data:
